<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Gallery</title>

<style>

body{
text-align:center;
font-family:Arial;
}

h1{
margin-top:30px;
}

.gallery{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:50px;
}

img{
width:500px;
max-width:90%;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:24px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Image Gallery</h1>

<div class="gallery">

<button onclick="previous()">❮</button>

<img
id="image"
src="https://picsum.photos/500/300?random=1">

<button onclick="next()">❯</button>

</div>

<script>

let current = 1;

function next(){

current++;

document.getElementById("image").src=
"https://picsum.photos/500/300?random="
+ current;

}

function previous(){

if(current>1){
current--;
}

document.getElementById("image").src=
"https://picsum.photos/500/300?random="
+ current;

}

</script>

</body>

</html>
